server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # 정적 파일 서빙. 없는 경로는 index.html로 보내지 않고 404 처리
    # (페이지가 index/page2/page3/chatting 로 명확히 나뉘므로 SPA 폴백 불필요)
    location / {
        try_files $uri $uri/ =404;
    }

    # 이미지/정적 자원 캐시
    location /Images/ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
