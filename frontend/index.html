<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--구글 폰트 찾아놓기 --> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Insight Bank</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #b0b0b0;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      width: 100%;
      max-width: 400px;
      height: 100vh;
      
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .top {
      width: 400px;
      height: 400px;
      background: #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 2px solid #007AFF;

    }

    .logo-box {
      width: 100%;
      padding: 28px 16px;
      /*border: 2px solid #007AFF;*/
      border-radius: 10px;
      background: #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .logo-box img {
      width: 100%;
      max-width: 400px;

      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards 0.2s;
    }

    .bottom {
      width: 400px;
      height: 400px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 6px;
      font-family: 'Outfit', sans-serif;
      color: #8E8E93;
      text-transform: uppercase;
      /*margin-bottom: 10px;*/

      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards 0.2s;
    }

    .tagline {
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      color: #8E8E93;
      line-height: 1.7;
      text-align: center;

      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards 0.2s;
    }

    .get-started-btn {
      width: 100%;
      padding: 18px;
      background: #007AFF;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 50px;
      transition: opacity 0.2s;

      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards 0.65s;
    }

    .get-started-btn:hover { opacity: 0.85; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="top">
    <div class="logo-box">
      <img src="./Images/Logo.png" alt="Insight Bank" />
    </div>
  </div>
  <div class="bottom">
    <div class="brand-name">Insightio</div>
    <div class="tagline">Getting things done has never been this easy with the world's most leading chatbot.</div>
    <button class="get-started-btn" onclick="window.location.href='page2.html'">Get Started</button>
  </div>
</div>
</body>
</html>
